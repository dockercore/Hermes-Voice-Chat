<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hermes 语音助手</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .header {
    padding: 16px 20px;
    background: #111;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header h1 { font-size: 18px; font-weight: 600; }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    transition: background 0.3s;
  }
  .status-dot.connected { background: #4ade80; }
  .status-dot.thinking { background: #facc15; animation: pulse 1s infinite; }
  .status-dot.recording { background: #f87171; animation: pulse 0.8s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 15px;
    line-height: 1.5;
    word-break: break-word;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .message.user {
    align-self: flex-end;
    background: #2563eb;
    color: white;
    border-bottom-right-radius: 4px;
  }
  .message.assistant {
    align-self: flex-start;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-bottom-left-radius: 4px;
  }
  .message.system {
    align-self: center;
    background: transparent;
    color: #666;
    font-size: 13px;
    padding: 4px 12px;
  }

  .controls {
    padding: 16px 20px 32px;
    background: #111;
    border-top: 1px solid #222;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .status-text {
    font-size: 13px;
    color: #888;
    min-height: 20px;
  }

  .mic-button {
    width: 72px; height: 72px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: white;
    font-size: 28px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .mic-button:hover { transform: scale(1.05); }
  .mic-button:active, .mic-button.recording {
    transform: scale(1.1);
    background: linear-gradient(135deg, #dc2626, #b91c1c);
    box-shadow: 0 0 30px rgba(220,38,38,0.4);
  }
  .mic-button.disabled {
    background: #333;
    cursor: not-allowed;
    transform: none;
  }
  .mic-button.interrupt {
    background: linear-gradient(135deg, #f59e0b, #d97706);
    animation: pulse 0.6s infinite;
  }
  .mic-button .ripple {
    position: absolute;
    width: 72px; height: 72px;
    border-radius: 50%;
    border: 2px solid #dc2626;
    animation: rippleOut 1.5s infinite;
  }
  @keyframes rippleOut { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(2); opacity: 0; } }

  .text-input-row {
    display: flex;
    gap: 8px;
    width: 100%;
    max-width: 600px;
  }
  .text-input {
    flex: 1;
    padding: 10px 16px;
    border-radius: 20px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: #e0e0e0;
    font-size: 15px;
    outline: none;
  }
  .text-input:focus { border-color: #2563eb; }
  .send-btn {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: #2563eb;
    color: white;
    font-size: 15px;
    cursor: pointer;
  }
  .send-btn:hover { background: #1d4ed8; }

  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 30px;
  }
  .waveform .bar {
    width: 3px;
    background: #f87171;
    border-radius: 2px;
    animation: wave 0.5s ease-in-out infinite;
  }
  @keyframes wave { 0%,100% { height: 8px; } 50% { height: 24px; } }
</style>
</head>
<body>

<div class="header">
  <div class="status-dot" id="statusDot"></div>
  <h1>Hermes 语音助手</h1>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="controls">
  <div class="status-text" id="statusText">连接中...</div>

  <div id="recordingIndicator" style="display:none" class="waveform">
    <div class="bar" style="animation-delay:0s"></div>
    <div class="bar" style="animation-delay:0.1s"></div>
    <div class="bar" style="animation-delay:0.2s"></div>
    <div class="bar" style="animation-delay:0.3s"></div>
    <div class="bar" style="animation-delay:0.4s"></div>
    <div class="bar" style="animation-delay:0.3s"></div>
    <div class="bar" style="animation-delay:0.2s"></div>
  </div>

  <button class="mic-button" id="micBtn" disabled>
    🎤
  </button>

  <div class="text-input-row">
    <input class="text-input" id="textInput" placeholder="或在这里输入文字..." />
    <button class="send-btn" id="sendBtn">发送</button>
  </div>
</div>

<script>
const ws = new WebSocket(`ws://${location.host}/ws/voice`);
const chatArea = document.getElementById('chatArea');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const micBtn = document.getElementById('micBtn');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
const recordingIndicator = document.getElementById('recordingIndicator');

let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let isProcessing = false;
let audioBuffer = [];

// WebSocket 消息处理
ws.onopen = () => {
  statusDot.classList.add('connected');
  micBtn.disabled = false;
  statusText.textContent = '已连接';
};

ws.onclose = () => {
  statusDot.classList.remove('connected');
  micBtn.disabled = true;
  statusText.textContent = '连接断开，请刷新';
};

ws.onerror = () => {
  statusText.textContent = '连接错误';
};

// 当前播放的音频
let currentAudio = null;

ws.onmessage = (event) => {
  if (typeof event.data === 'string') {
    const data = JSON.parse(event.data);
    switch (data.type) {
      case 'status':
        statusText.textContent = data.message;
        if (data.message.includes('思考') || data.message.includes('执行') || data.message.includes('识别') || data.message.includes('生成')) {
          statusDot.classList.add('thinking');
          // 处理中：麦克风变为打断按钮
          micBtn.classList.add('interrupt');
          micBtn.classList.remove('disabled');
          micBtn.disabled = false;
        } else {
          statusDot.classList.remove('thinking');
          statusDot.classList.remove('recording');
          micBtn.classList.remove('interrupt');
        }
        break;
      case 'user_text':
        addMessage('user', data.message);
        break;
      case 'assistant_text':
        addMessage('assistant', data.message);
        break;
      case 'audio':
        audioBuffer = [];
        break;
      case 'audio_end':
        playAudioBuffer();
        isProcessing = false;
        micBtn.classList.remove('disabled');
        micBtn.classList.remove('interrupt');
        break;
      case 'interrupted':
        // 服务端确认打断
        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }
        isProcessing = false;
        micBtn.classList.remove('disabled');
        micBtn.classList.remove('interrupt');
        statusDot.classList.remove('thinking');
        addMessage('system', '已打断');
        break;
      case 'error':
        addMessage('system', '错误: ' + data.message);
        isProcessing = false;
        micBtn.classList.remove('disabled');
        micBtn.classList.remove('interrupt');
        break;
    }
  } else if (event.data instanceof Blob) {
    audioBuffer.push(event.data);
  }
};

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.textContent = text;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

// 音频播放
async function playAudioBuffer() {
  if (audioBuffer.length === 0) return;
  const blob = new Blob(audioBuffer, { type: 'audio/ogg' });
  const url = URL.createObjectURL(blob);
  const audio = new Audio(url);
  currentAudio = audio;
  audio.play();
  statusText.textContent = '正在播放...';
  audio.onended = () => {
    currentAudio = null;
    URL.revokeObjectURL(url);
    statusText.textContent = '按住麦克风说话';
  };
}

// 录音功能
async function startRecording() {
  // 如果正在处理或播放，先打断
  if (isProcessing || currentAudio) {
    // 停止音频播放
    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }
    // 发送打断请求给服务端
    if (isProcessing) {
      ws.send(JSON.stringify({ type: 'interrupt' }));
      isProcessing = false;
    }
    micBtn.classList.remove('interrupt');
    micBtn.classList.remove('disabled');
    // 等一小会让打断生效
    await new Promise(r => setTimeout(r, 100));
  }

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    audioChunks = [];

    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) audioChunks.push(e.data);
    };

    mediaRecorder.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(audioChunks, { type: 'audio/webm' });

      // 读取并发送
      const reader = blob.stream().getReader();
      const all = [];
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        all.push(value);
      }
      const fullData = new Uint8Array(all.reduce((a, c) => a + c.length, 0));
      let offset = 0;
      for (const chunk of all) {
        fullData.set(chunk, offset);
        offset += chunk.length;
      }

      if (fullData.length > 100) {
        ws.send(fullData.buffer);
        isProcessing = true;
        micBtn.classList.add('disabled');
      }

      isRecording = false;
      recordingIndicator.style.display = 'none';
      statusDot.classList.remove('recording');
    };

    mediaRecorder.start();
    isRecording = true;
    statusDot.classList.add('recording');
    recordingIndicator.style.display = 'flex';
    statusText.textContent = '正在录音...松开发送';
  } catch (e) {
    statusText.textContent = '无法访问麦克风: ' + e.message;
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

// 按住说话
micBtn.addEventListener('mousedown', (e) => { e.preventDefault(); startRecording(); });
micBtn.addEventListener('mouseup', (e) => { e.preventDefault(); stopRecording(); });
micBtn.addEventListener('mouseleave', () => stopRecording());
micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startRecording(); });
micBtn.addEventListener('touchend', (e) => { e.preventDefault(); stopRecording(); });

// 文字发送
function sendText() {
  const text = textInput.value.trim();
  if (!text || isProcessing) return;
  ws.send(JSON.stringify({ type: 'text_input', message: text }));
  addMessage('user', text);
  textInput.value = '';
  isProcessing = true;
  micBtn.classList.add('disabled');
}

sendBtn.addEventListener('click', sendText);
textInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendText(); });

// 初始消息
addMessage('system', '语音对话已就绪，按住麦克风说话，或输入文字');
</script>
</body>
</html>
